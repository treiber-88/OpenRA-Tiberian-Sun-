# ============================================================
# NEW AI  (easy / medium / hard / diabolical)
# ============================================================
Player:
	ModularBot@bot-easy:
		Name: bot-easy.name
		Type: easy
	ModularBot@bot-medium:
		Name: bot-medium.name
		Type: medium
	ModularBot@bot-hard:
		Name: bot-hard.name
		Type: hard
	ModularBot@bot-diabolical:
		Name: bot-diabolical.name
		Type: diabolical

	GrantConditionOnBotOwner@easy:
		Condition: enable-easy-ai
		Bots: easy
	GrantConditionOnBotOwner@medium:
		Condition: enable-medium-ai
		Bots: medium
	GrantConditionOnBotOwner@hard:
		Condition: enable-hard-ai
		Bots: hard
	GrantConditionOnBotOwner@diabolical:
		Condition: enable-diabolical-ai
		Bots: diabolical

	# ---- Harvester ----
	HarvesterBotModule@easy:
		RequiresCondition: enable-easy-ai
		HarvesterTypes: harv
		RefineryTypes: proc
	HarvesterBotModule@medium:
		RequiresCondition: enable-medium-ai
		HarvesterTypes: harv
		RefineryTypes: proc
	HarvesterBotModule@hard:
		RequiresCondition: enable-hard-ai
		HarvesterTypes: harv
		RefineryTypes: proc
	HarvesterBotModule@diabolical:
		RequiresCondition: enable-diabolical-ai
		HarvesterTypes: harv
		RefineryTypes: proc

	# ---- Base builder ----
	BaseBuilderBotModule@easy:
		RequiresCondition: enable-easy-ai
